run:
  timeout: 5m
  tests: true
  build-tags:
    - integration

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - nilerr

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/OpceanAI/Doki
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
    - path: cmd/
      linters:
        - unparam

output:
  formats:
    - format: colored-line-number
  sort-results: true
