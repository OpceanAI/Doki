name: Feature Request
description: Suggest a new feature or improvement for Doki
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for Doki.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like Doki to do?
      placeholder: "A clear description of the feature..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - CLI Commands
        - Daemon / API
        - Networking
        - Storage
        - Security
        - Performance
        - Compose
        - Kubernetes / CRI
        - Builder / Dokifile
        - DokiVM / MicroVMs
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: Why do you need this? How would you use it?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example Usage
      description: How would the feature look from the user's perspective?
      placeholder: |
        ```bash
        doki feature-name --flag value
        ```
      render: bash
